# OpenMW settings.cfg — пример настройки шрифтов и базовых параметров
#
# Скопируйте этот файл в папку openmw-profile после первого запуска игры.
# Папка openmw-profile обычно находится здесь:
#   Linux (Proton): ~/openmw-profile/settings.cfg
#   Windows:        %USERPROFILE%\Documents\My Games\OpenMW\settings.cfg

[Video]
resolution x = 1920
resolution y = 1080
window border = false

[GUI]
ttf resolution = 120
font size = 20
scaling factor = 1.3

[Input]
always run = true

[Camera]
third person camera distance = 280